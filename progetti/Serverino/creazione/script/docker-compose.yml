# Compose per TEST locale che simula i vincoli del Serverino fisico.
# Limiti RAM/CPU = AMD A9 4GB (lasciato 3.5g di margine come l'OS reale).
services:
  serverino-bot:
    build: .
    container_name: serverino-bot
    env_file: .env
    # --- Vincoli hardware Serverino (stress test) ---
    mem_limit: 3584m          # 3.5 GB (su 4 GB fisici, margine OS)
    memswap_limit: 4096m      # +0.5 GB swap, come SSD swap reale
    cpus: 1.0                 # 1 core (il Serverino ne ha 2, qui worst-case)
    # --- Volumi ---
    volumes:
      # Clone locale del vault, in sola lettura: il bot legge, non scrive qui.
      - ./vault:/vault:ro
      # Eccezione (Decisione B): solo bot-memory.md è scrivibile, per /ricorda.
      # Il mount più specifico vince sul :ro del vault. NB: il file deve ESISTERE
      # sull'host prima di `up`, altrimenti Docker crea una directory al suo posto.
      - ./vault/idee/bot-memory.md:/vault/idee/bot-memory.md:rw
      # Persistenza DB e log fuori dal container.
      - ./storage:/app/storage
      - ./logs:/app/logs
    restart: unless-stopped   # specchio di systemd Restart=always
